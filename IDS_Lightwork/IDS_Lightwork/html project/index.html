<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Command Center</title>
    <!-- Imports Tailwind CSS so I don't have to write custom CSS! -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Dark-mode background and white text -->
<body class="bg-slate-900 text-slate-100 p-8">

    <!-- ZONE 1: The Header -->
    <div class="max-w-4xl mx-auto mb-8">
        <h1 class="text-3xl font-bold text-red-500">Network IDS Dashboard</h1>
        <p class="text-slate-400">Live Port Scan Detection</p>
    </div>

    <!-- ZONE 2: The Control Panel (Button) -->
    <div class="max-w-4xl mx-auto mb-4">
        <!-- Hint: Add an onclick="" attribute to this button to trigger your JS function -->
        <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold" type="button" onclick="fetch_alerts()">
            Fetch Latest Alerts
        </button>
    </div>

    <!-- ZONE 3: The Data Table -->
    <div class="max-w-4xl mx-auto bg-slate-800 rounded-lg p-4">
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-slate-700">
                    <th class="p-2">ID</th>
                    <th class="p-2">Attacker IP</th>
                    <th class="p-2">Timestamp</th>
                    <th class="p-2">Attack Type</th>
                </tr>
            </thead>
            <!-- Give this tbody an ID so your JavaScript knows exactly where to inject the data! -->
            <tbody id="alert-data-container">
                <!-- JavaScript will inject <tr> elements here later -->
            </tbody>
        </table>
    </div>

    <!-- ZONE 4: The JavaScript Engine -->
    <script>
        // Brainstorming your JS function:
        // 1. Create an async function called fetchAlerts()
        // 2. Use await fetch('http://127.0.0.1:5000/api/alerts')
        // 3. Parse the JSON
        // 4. Use document.getElementById() to grab the tbody
        // 5. Loop through the data and add rows to the tbody
        async function fetch_alerts(){
            try{
                let response = await fetch('http://127.0.0.1:5000/api/alerts');
                let data = await response.json();
                
                var tbl = document.getElementById("alert-data-container");
                
                tbl.innerHTML = '';
                
                data.forEach(item => {
                    const row = document.createElement("tr");
                    
                    // Grab the raw time and multiply by 1000 for JavaScript
                    let rawTime = item.Timestamp; 
                    let dateObject = new Date(rawTime * 1000);dateObject
                    let readableTime = dateObject.toLocaleString();
                    
                    row.innerHTML = `
                        <td class="p-2 border-b border-slate-700">${item.ID}</td>
                        <td class="p-2 border-b border-slate-700">${item.IP_Address}</td>
                        <td class="p-2 border-b border-slate-700 text-yellow-400">${readableTime}</td>
                        <td class="p-2 border-b border-slate-700">${item.Type}</td>
                    `;
                    
                tbl.appendChild(row);
              });
                
                
            }catch(error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>
</body>
</html>
